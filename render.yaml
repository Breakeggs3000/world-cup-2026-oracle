# Render Blueprint — World Cup 2026 Oracle API
# Repo: https://github.com/Breakeggs3000/world-cup-2026-oracle
# Deploy: Render Dashboard → New → Blueprint → connect repo → apply render.yaml

services:
  - type: web
    name: world-cup-2026-oracle-api
    runtime: python
    plan: free
    buildCommand: >-
      cd src/backend &&
      pip install -r requirements.txt &&
      python scripts/deploy_prepare.py
    startCommand: cd src/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_ORIGINS
        sync: false
        # Set in dashboard, e.g. https://your-app.vercel.app
